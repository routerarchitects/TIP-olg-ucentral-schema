description:
  A device has certain global properties that are used to derive parts of
  the final configuration that gets applied.
type: object
properties:
  ipv4-network:
    description:
      Define the IPv4 range that is delegatable to the downstream interfaces
      This is described as a CIDR block. (192.168.0.0/16, 172.16.128/17)
    type: string
    format: uc-cidr4
    examples:
    - 192.168.0.0/16
  ipv6-network:
    description:
      Define the IPv6 range that is delegatable to the downstream interfaces
      This is described as a CIDR block. (fdca:1234:4567::/48)
    type: string
    format: uc-cidr6
    examples:
    - fdca:1234:4567::/48
  wireless-multimedia:
    anyOf:
     - $ref: 'https://ucentral.io/schema/v1/globals/wireless-multimedia/table/'
     - $ref: 'https://ucentral.io/schema/v1/globals/wireless-multimedia/profile/'
  dhcp-defaults:
    description:
      Site-wide fallback values for DHCP server configuration. Any interface
      with an ipv4.dhcp block that omits one of these fields inherits the value
      from here. Renderers must resolve these fallbacks against the raw
      configuration, not the schemareader output, because the per-interface
      ipv4.dhcp.lease-time carries its own default that the reader injects when
      omitted. The resolution order for a given interface is therefore the
      per-interface value, then this site-wide default, then the per-interface
      schema default. No default is set here so an omitted site-wide value stays
      genuinely absent rather than masking the per-interface default.
    type: object
    properties:
      lease-time:
        description:
          How long the lease is valid before a RENEW must be issued.
        type: string
        format: uc-timeout
      use-dns:
        description:
         The DNS server sent to clients as DHCP option 6.
        anyOf:
          - type: string
            format: ipv4
          - type: array
            items:
              type: string
              format: ipv4
