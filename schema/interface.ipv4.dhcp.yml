description:
  This section describes the DHCP server configuration
type: object
required:
  - lease-start
  - lease-end
properties:
  lease-start:
    description:
      The first IPv4 address in the DHCP pool (inclusive).
    type: string
    format: ipv4
    examples:
    - "192.168.1.10"
    - "172.20.4.1"
  lease-end:
    description:
      The last IPv4 address in the DHCP pool (inclusive).
    type: string
    format: ipv4
    examples:
    - "192.168.1.253"
    - "172.20.15.254"
  lease-time:
    description:
      How long the lease is valid before a RENEW must be issued.
    type: string
    format: uc-timeout
    default: 6h
  use-dns:
    description:
     The DNS server sent to clients as DHCP option 6.
    anyOf:
      - type: string
        format: ipv4
      - type: array
        items:
          type: string
          format: ipv4
